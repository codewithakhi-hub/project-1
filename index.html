<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A stylish Hello World page" />
  <title>Hello, World!</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f7f7ff;
      --muted: #b9bad0;
      --violet: #9c7bff;
      --pink: #ff70b8;
      --panel: rgba(20, 21, 45, 0.72);
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: #101126;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      width: 38rem;
      aspect-ratio: 1;
      border-radius: 50%;
      filter: blur(28px);
      opacity: 0.6;
      z-index: -1;
      animation: drift 12s ease-in-out infinite alternate;
    }

    body::before { background: #5837d8; top: -15rem; left: -12rem; }
    body::after { background: #d7378c; right: -15rem; bottom: -16rem; animation-delay: -5s; }

    main {
      width: min(92vw, 720px);
      padding: clamp(2rem, 7vw, 5.5rem);
      text-align: center;
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 28px;
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.38);
      backdrop-filter: blur(18px);
      animation: appear 700ms cubic-bezier(.2, .8, .2, 1) both;
    }

    nav { display: flex; justify-content: center; gap: 0.5rem; margin-bottom: 1.75rem; }
    nav a { padding: 0.45rem 0.75rem; border-radius: 999px; color: var(--muted); font-size: 0.9rem; font-weight: 700; text-decoration: none; }
    nav a:hover, nav a[aria-current="page"] { color: var(--ink); background: rgba(255, 255, 255, 0.12); }

    .badge {
      display: inline-block;
      padding: 0.45rem 0.85rem;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 999px;
      color: #ded9ff;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      margin: 1.25rem 0 0.75rem;
      font-size: clamp(3.4rem, 12vw, 7rem);
      line-height: 0.95;
      letter-spacing: -0.075em;
      background: linear-gradient(120deg, #fff 16%, #baabff 50%, #ff9dcd 84%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    p {
      max-width: 38rem;
      margin: 0 auto;
      color: var(--muted);
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      line-height: 1.7;
    }

    .sparkles {
      margin-top: 2.25rem;
      color: var(--pink);
      font-size: 1.5rem;
      letter-spacing: 0.55rem;
      text-indent: 0.55rem;
    }

    @keyframes appear {
      from { opacity: 0; transform: translateY(22px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes drift {
      to { transform: translate(6rem, 4rem) scale(1.15); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 1ms !important; }
    }
  </style>
</head>
<body>
  <main>
    <nav aria-label="Main navigation">
      <a href="index.html" aria-current="page">Home</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
    <span class="badge">A friendly beginning</span>
    <h1>Hello, World!</h1>
    <p>Every great idea starts somewhere. This is a small, beautiful first step.</p>
    <div class="sparkles" aria-hidden="true">✦ ✧ ✦</div>
  </main>
</body>
</html>
