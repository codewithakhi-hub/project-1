<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Learn more about Akhi" />
  <title>About Akhi</title>
  <style>
    :root { color-scheme: dark; --ink:#f7f7ff; --muted:#b9bad0; --panel:rgba(20,21,45,.72); }
    * { box-sizing: border-box; }
    body { min-height:100vh; margin:0; display:grid; place-items:center; overflow:hidden; font-family:Inter,ui-sans-serif,system-ui,sans-serif; color:var(--ink); background:#101126; }
    body::before, body::after { content:""; position:fixed; width:38rem; aspect-ratio:1; border-radius:50%; filter:blur(28px); opacity:.6; z-index:-1; animation:drift 12s ease-in-out infinite alternate; }
    body::before { background:#5837d8; top:-15rem; left:-12rem; } body::after { background:#d7378c; right:-15rem; bottom:-16rem; animation-delay:-5s; }
    main { width:min(92vw,720px); padding:clamp(2rem,7vw,5.5rem); text-align:center; background:var(--panel); border:1px solid rgba(255,255,255,.16); border-radius:28px; box-shadow:0 28px 80px rgba(0,0,0,.38); backdrop-filter:blur(18px); animation:appear 700ms cubic-bezier(.2,.8,.2,1) both; }
    nav { display:flex; justify-content:center; gap:.5rem; margin-bottom:2.5rem; } nav a { padding:.45rem .75rem; border-radius:999px; color:var(--muted); font-size:.9rem; font-weight:700; text-decoration:none; } nav a:hover, nav a[aria-current="page"] { color:var(--ink); background:rgba(255,255,255,.12); }
    .eyebrow { color:#ded9ff; font-size:.8rem; font-weight:700; letter-spacing:.12em; text-transform:uppercase; } h1 { margin:.75rem 0 1rem; font-size:clamp(3rem,10vw,5.5rem); letter-spacing:-.06em; background:linear-gradient(120deg,#fff 16%,#baabff 50%,#ff9dcd 84%); -webkit-background-clip:text; background-clip:text; color:transparent; } p { max-width:36rem; margin:0 auto; color:var(--muted); font-size:1.12rem; line-height:1.75; } @keyframes appear { from { opacity:0; transform:translateY(22px) scale(.97); } to { opacity:1; transform:translateY(0) scale(1); } } @keyframes drift { to { transform:translate(6rem,4rem) scale(1.15); } }
  </style>
</head>
<body>
  <main>
    <nav aria-label="Main navigation"><a href="index.html">Home</a><a href="about.html" aria-current="page">About</a><a href="gallery.html">Gallery</a><a href="contact.html">Contact</a></nav>
    <div class="eyebrow">Nice to meet you</div>
    <h1>About Akhi</h1>
    <p>Welcome to my corner of the web. I’m Akhi, and this is a space for ideas, projects, and the things I’m excited to share.</p>
  </main>
</body>
</html>
